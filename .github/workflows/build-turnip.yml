name: Build Turnip (Mesa) for Winlator

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Android NDK
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk-bundle" >> $GITHUB_ENV
          if [ ! -d "$ANDROID_SDK_ROOT/ndk-bundle" ]; then
            LATEST_NDK=$(ls -d $ANDROID_SDK_ROOT/ndk/* | tail -1)
            echo "ANDROID_NDK_ROOT=$LATEST_NDK" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ninja-build pkg-config libdrm-dev mesa-utils x11proto-dri2-dev libxshmfence-dev libxxf86vm-dev libxext-dev libx11-dev libxcb-glx0-dev libxcb-shm0-dev libxcb-dri2-0-dev libxcb-dri3-dev libxcb-present-dev libx11-xcb-dev libxrandr-dev libwayland-dev wayland-protocols libwayland-egl-backend-dev libexpat1-dev zlib1g-dev libzstd-dev
          pip3 install meson mako

      - name: Configure and Build (ARM64)
        run: |
          cat <<EOF > android-arm64.txt
          [binaries]
          c = '$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang'
          cpp = '$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang++'
          ar = '$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar'
          strip = '$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip'
          pkg-config = 'pkg-config'

          [host_machine]
          system = 'linux'
          cpu_family = 'aarch64'
          cpu = 'armv8-a'
          endian = 'little'

          [properties]
          sys_root = '$ANDROID_NDK_ROOT/sysroot'
          needs_exe_wrapper = true
          EOF

          meson setup build-android \
            --cross-file android-arm64.txt \
            -Dplatforms= \
            -Dgallium-drivers= \
            -Dvulkan-drivers=freedreno \
            -Dbuildtype=release \
            -Doptimization=3 \
            -Dstrip=true \
            -Dshader-cache=disabled \
            -Dgbm=disabled \
            -Degl=disabled \
            -Dglx=disabled \
            -Dopengl=false \
            -Dgles1=disabled \
            -Dgles2=disabled \
            -Dvalgrind=disabled \
            -Dtools= \
            -Dfreedreno-kmds=msm

          ninja -C build-android src/freedreno/vulkan/libvulkan_freedreno.so

      - name: Package for Winlator (Adreno Tools Style)
        run: |
          mkdir -p turnip-optimized/meta
          cp build-android/src/freedreno/vulkan/libvulkan_freedreno.so turnip-optimized/vulkan_freedreno.so
          
          cat <<EOF > turnip-optimized/meta/config.json
          {
            "name": "Turnip Optimized (Florkaa)",
            "description": "Mesa Turnip driver with GMEM and IR3 optimizations for Winlator",
            "version": "24.1.0-opt",
            "author": "Florkaa282810"
          }
          EOF
          
          cd turnip-optimized && zip -r ../turnip-optimized-winlator.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: turnip-optimized-winlator
          path: turnip-optimized-winlator.zip
