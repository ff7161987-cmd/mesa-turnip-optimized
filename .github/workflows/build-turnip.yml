name: Build Turnip (Mesa) for Winlator (Steven Base)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git meson ninja-build patchelf unzip curl python3-pip flex bison zip glslang-tools
          pip3 install mako --break-system-packages

      - name: Build Turnip
        run: |
          # Create workdir
          mkdir -p turnip_workdir
          cd turnip_workdir
          
          # Download NDK r27 (more stable for this)
          curl -sL "https://dl.google.com/android/repository/android-ndk-r27-linux.zip" -o "ndk.zip"
          unzip -q "ndk.zip"
          NDK_PATH=$(pwd)/android-ndk-r27
          
          # Clone Mesa (using a stable version)
          git clone --depth 1 https://gitlab.freedesktop.org/mesa/mesa.git -b mesa-24.1.1 mesa-src
          cd mesa-src
          
          # APPLY MY OPTIMIZATIONS (GMEM Hysteresis & IR3)
          # 1. GMEM Hysteresis Optimization
          sed -i 's/tu_cmd_buffer_emit_gmem_config(cmd, &cmd->state.pass->gmem_config, false);/tu_cmd_buffer_emit_gmem_config(cmd, \&cmd->state.pass->gmem_config, true);/g' src/freedreno/vulkan/tu_cmd_buffer.cc || true
          
          # 2. IR3 Register Allocation Tuning (Reduce pressure for Adreno 660/Snapdragon 870)
          sed -i 's/compiler->max_regs = 128;/compiler->max_regs = 96;/g' src/freedreno/ir3/ir3_compiler.c || true

          # Set up cross-file
          cat <<EOF > "android-aarch64.txt"
          [binaries]
          ar = '$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar'
          c = '$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang'
          cpp = ['$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang++', '-fno-exceptions', '-fno-unwind-tables', '-fno-asynchronous-unwind-tables', '-static-libstdc++']
          c_ld = '$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/ld.lld'
          cpp_ld = '$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/ld.lld'
          strip = '$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip'
          pkg-config = '/usr/bin/pkg-config'

          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'
          EOF

          # Build
          meson setup build-android \
              --cross-file "android-aarch64.txt" \
              -Dbuildtype=release \
              -Doptimization=3 \
              -Dstrip=true \
              -Dplatforms=android \
              -Dandroid-stub=true \
              -Dgallium-drivers= \
              -Dvulkan-drivers=freedreno \
              -Dfreedreno-kmds=msm,kgsl \
              -Dvideo-codecs= \
              -Degl=disabled \
              -Dgles1=disabled \
              -Dgles2=disabled \
              -Dopengl=false \
              -Dgbm=disabled \
              -Dglx=disabled \
              -Dtools= \
              -Dzstd=disabled

          ninja -C build-android src/freedreno/vulkan/libvulkan_freedreno.so

          # Package
          mkdir -p out
          cp build-android/src/freedreno/vulkan/libvulkan_freedreno.so out/
          
          cat <<EOF > out/meta.json
          {
            "schemaVersion": 1,
            "name": "Turnip-ETS-Turbo (Florkaa)",
            "description": "Snapdragon 870 Optimized - GMEM Hysteresis & IR3 Tuning",
            "author": "Florkaa282810",
            "packageVersion": "1",
            "vendor": "Mesa",
            "driverVersion": "24.1.1-Turbo",
            "minApi": 28,
            "libraryName": "libvulkan_freedreno.so"
          }
          EOF
          
          cd out && zip -r ../../turnip-optimized.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: turnip-optimized-winlator
          path: turnip-optimized.zip
